<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>BatterBox Admin</title>
<link rel="icon" href="img/walter.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/batterbox.css">
</head>
<body class="admin">
<header class="admin-header">
  <h1>BatterBox Admin</h1>
  <nav>
    <button type="button" id="btn-bt" aria-label="Bluetooth speaker pairing" title="Bluetooth"><span class="bt-dot" aria-hidden="true"></span>BT</button>
    <a class="nav-btn" href="index.html">&#9664; KIOSK</a>
  </nav>
</header>
<div style="padding:10px 14px 0; max-width:1024px; margin:0 auto;">
  <div class="banner" id="warn-banner" role="alert"></div>
</div>
<main class="admin-main">

  <section class="section" id="teams-section">
    <h2>Teams Config</h2>
    <div class="form-row active-team-row">
      <label for="active-team-select">Kiosk team:</label>
      <select id="active-team-select" aria-label="Active team on kiosk"></select>
    </div>
    <div class="form-row active-team-row">
      <label for="config-team-select">Edit team:</label>
      <select id="config-team-select" aria-label="Team to configure"></select>
    </div>
    <div class="form-row">
      <button type="button" id="btn-rename-team">Rename</button>
      <button type="button" class="btn-danger" id="btn-delete-team">Delete</button>
    </div>
    <div class="form-row">
      <input id="new-team-name" placeholder="New team name" autocomplete="off">
      <button type="button" class="btn-primary" id="btn-add-team">Add Team</button>
    </div>
  </section>

  <section class="section" id="wifi-section">
    <h2>Wi-Fi Hotspot</h2>
    <p id="wifi-status" class="wifi-status">Wi-Fi status: loading…</p>
    <div class="form-row active-team-row">
      <label for="wifi-ssid">SSID:</label>
      <input id="wifi-ssid" autocomplete="off" maxlength="32" autocapitalize="off" spellcheck="false">
    </div>
    <div class="form-row active-team-row">
      <label for="wifi-password">Password:</label>
      <input id="wifi-password" autocomplete="off" maxlength="63" autocapitalize="off" spellcheck="false">
    </div>
    <p class="wifi-hint">Password shown in plain text so you can read it aloud — 8–63 characters. The Pi leaves its current Wi-Fi when the hotspot starts.</p>
    <div class="form-row">
      <button type="button" class="btn-primary" id="btn-wifi-save">Save Settings</button>
      <button type="button" class="btn-ok" id="btn-wifi-start">Start Hotspot</button>
      <button type="button" class="btn-danger" id="btn-wifi-stop">Stop Hotspot</button>
    </div>
  </section>

  <section class="section" id="players-section">
    <h2>Players — <span id="players-team-name">…</span></h2>
    <p style="color:var(--dim); font-size:18px; margin:0 0 10px;">
      Drag <b>&#8801;</b> to reorder the batting order. Tap a player to edit details and clips.
    </p>
    <div id="player-list"></div>
    <div class="form-row">
      <input id="new-player-name" placeholder="Player name" autocomplete="off">
      <input id="new-player-jersey" placeholder="Jersey #" inputmode="numeric" style="max-width:140px;">
      <button type="button" class="btn-primary" id="btn-add-player">Add Player</button>
    </div>
  </section>

</main>
<script type="module" src="js/admin.js"></script>
</body>
</html>
